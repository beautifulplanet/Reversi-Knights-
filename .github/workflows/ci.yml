name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Engine tests (200 games)
        run: npx tsx test-engine.ts

      - name: UI flow tests (2000 games)
        run: npx tsx test-ui-flow.ts

      - name: Knight capture tests
        run: npx tsx test-knight-captures.ts

      - name: Build
        run: npm run build
